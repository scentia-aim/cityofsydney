<script>
var DATA = [{"t": "30-Day Campaign Builder", "d": "A strategic AI workflow that creates four weeks of content: Week 1 Awareness, Week 2 Education, Week 3 Proof, Week 4 Action."}, {"t": "A/B Testing", "d": "Comparing two versions of something to see which performs better."}, {"t": "Acceptable Use", "d": "The approved ways staff or users may use AI tools."}, {"t": "Access Control", "d": "Rules that determine who can see, use or edit information."}, {"t": "Accessibility", "d": "Designing content, tools and communication so they can be used by people with different abilities and needs."}, {"t": "Accessibility Check", "d": "Reviewing content to make sure people with different needs can use or understand it."}, {"t": "Accountability", "d": "The principle that humans and organisations remain responsible for decisions and outcomes involving AI."}, {"t": "Act–Explain–Please", "d": "A simple prompting formula: tell AI who to act as, explain the situation, then ask clearly for what you want."}, {"t": "Action", "d": "The task performed after a trigger, such as sending a reply, creating a task or updating a spreadsheet."}, {"t": "Action Items", "d": "Tasks that need to be completed after a meeting or review."}, {"t": "Action Plan", "d": "A list of steps, owners and timelines for completing a goal."}, {"t": "Admin Console", "d": "A management area where organisations control user access, settings and security."}, {"t": "Agent", "d": "An AI system that can work through tasks in multiple steps, sometimes using tools or making decisions along the way."}, {"t": "Agentic AI", "d": "AI designed to take more initiative across a multi-step task rather than only answering one prompt."}, {"t": "AI / Artificial Intelligence", "d": "Software that can perform tasks that usually require human intelligence, such as understanding language, recognising patterns, generating content, or helping with decisions."}, {"t": "AI Agent", "d": "AI that can plan and act toward a goal, often using tools, files, search, code or other systems."}, {"t": "AI Governance", "d": "Policies, processes and responsibilities that guide how an organisation uses AI."}, {"t": "AI Literacy", "d": "The ability to understand, use and evaluate AI responsibly."}, {"t": "AI Maturity", "d": "How advanced an organisation is in adopting, governing and benefiting from AI."}, {"t": "AI Policy", "d": "An organisation’s rules for how AI should and should not be used."}, {"t": "AI Slop", "d": "Low-quality AI-generated content that feels generic, robotic, over-excited, cliché-heavy, inaccurate or careless."}, {"t": "AI Tool", "d": "The app or product people use to interact with AI, such as ChatGPT, Gemini, Claude, Canva, Midjourney or Copilot."}, {"t": "AI Workflow", "d": "A repeatable process where AI helps draft, summarise, analyse, classify, transform or check information."}, {"t": "Alignment", "d": "The process of making an AI model behave in ways that are useful, safe and consistent with human intentions."}, {"t": "Anonymisation", "d": "Removing details that identify a person or organisation."}, {"t": "API / Application Programming Interface", "d": "A way for software systems to connect and exchange information."}, {"t": "Approval Gate", "d": "A required human check before an AI-assisted workflow continues."}, {"t": "Approval Workflow", "d": "A process for checking and approving content or decisions before release."}, {"t": "Aspect Ratio", "d": "The shape of an image or video, such as 1:1 for square social posts, 9:16 for vertical video, or 16:9 for widescreen."}, {"t": "Attribution", "d": "Giving credit to the creator or source of content."}, {"t": "Audience", "d": "The person or group the content is intended for."}, {"t": "Audit Trail", "d": "A record showing what was done, when, by whom and why."}, {"t": "Automation", "d": "Using technology to complete a task with little or no manual effort."}, {"t": "Automation Bias", "d": "The tendency to trust automated outputs too much."}, {"t": "Best Practice", "d": "A recommended way of doing something based on experience, standards or evidence."}, {"t": "Bias", "d": "A pattern in AI output that may unfairly favour, exclude or stereotype people, groups or ideas."}, {"t": "Brand Guidelines", "d": "Rules for how a brand should look and sound, including logos, colours, fonts, tone and usage."}, {"t": "Brand Voice", "d": "The consistent tone, language and style a business uses in communication."}, {"t": "Brand Voice Block", "d": "A saved paragraph that describes your brand’s personality, tone, words and style. You paste it into prompts so AI sounds more like your business."}, {"t": "Briefing Note", "d": "A concise document explaining an issue, context, options and recommended next steps."}, {"t": "Campaign", "d": "A coordinated sequence of marketing activities aimed at a specific goal."}, {"t": "Canva", "d": "A design platform often used to create social posts, flyers, presentations, documents and branded marketing assets."}, {"t": "Caption", "d": "Text that accompanies a social media image, video or post."}, {"t": "Case Study", "d": "A detailed example showing how a product, service or project solved a problem."}, {"t": "Causation", "d": "When one thing directly causes another."}, {"t": "Change Management", "d": "Helping people and organisations adopt new processes, behaviours or technologies."}, {"t": "Channel", "d": "The platform or format where content will appear, such as email, LinkedIn, Instagram, Facebook, website, Google Business Profile or flyer."}, {"t": "Chart", "d": "A visual display of data, such as a bar chart, line chart or pie chart."}, {"t": "Chatbot", "d": "A system that interacts with users through conversation."}, {"t": "ChatGPT Images", "d": "Image generation and editing inside ChatGPT, useful for creating visual concepts, mockups, graphics and iterative image edits."}, {"t": "Cheat Sheet", "d": "A quick reference guide that helps people remember a process, formula or checklist."}, {"t": "Citation", "d": "A reference showing where information came from."}, {"t": "Classification", "d": "Sorting information into categories."}, {"t": "Cliché", "d": "An overused phrase that makes content feel generic, such as “in today’s fast-paced world” or “ever-evolving landscape.”"}, {"t": "Code Generation", "d": "AI creating programming code from instructions."}, {"t": "Cognitive Offloading", "d": "Using AI to reduce mental workload, such as organising notes or summarising documents."}, {"t": "Confidential Information", "d": "Information that should not be shared publicly, such as private customer details, staff records, business strategy or financial data."}, {"t": "Consent", "d": "Permission to use someone’s data, image, voice or information."}, {"t": "Constraint", "d": "A rule or limit included in the prompt, such as word count, tone, audience, format or things to avoid."}, {"t": "Consumer AI", "d": "AI tools designed for general public use, usually with fewer organisation-level controls."}, {"t": "Content Calendar", "d": "A schedule of planned posts, emails, campaigns or publications."}, {"t": "Content Hook", "d": "The opening idea or line designed to capture attention."}, {"t": "Context", "d": "The background information you give AI so it understands the task, audience, tone, goal and constraints."}, {"t": "Context Window", "d": "The amount of information an AI model can consider at one time. This includes your prompt, conversation history and sometimes files."}, {"t": "Conversion", "d": "When someone takes a desired action, such as signing up, booking, buying or clicking."}, {"t": "Copilot", "d": "An AI assistant that works alongside a human in a tool or workflow."}, {"t": "Copyright", "d": "Legal rights protecting original creative works. AI-generated content may still require careful rights review."}, {"t": "Correlation", "d": "A relationship where two things appear to move together. Correlation does not prove causation."}, {"t": "Creative Direction", "d": "Guidance on the look, feel, tone and purpose of creative work."}, {"t": "Crisis Comms", "d": "Communication during a serious issue, outage, controversy or emergency."}, {"t": "Critique Prompt", "d": "A prompt that asks AI to find weaknesses, risks, gaps or improvements in a draft."}, {"t": "CTA / Call to Action", "d": "The specific instruction at the end of marketing content telling the audience what to do next, such as “Book a call,” “Shop now,” or “Download the guide.”"}, {"t": "Custom Instructions", "d": "Saved instructions that tell an AI tool how you want it to respond, such as “always act as a professional marketing consultant.”"}, {"t": "Customer Journey", "d": "The experience a customer has from first discovering a business to becoming a repeat customer."}, {"t": "Customer Message", "d": "A communication sent to customers, such as a welcome email, apology, reminder, offer or follow-up."}, {"t": "Customer Persona", "d": "A detailed profile of an ideal buyer or audience segment, often including goals, needs, frustrations, objections and preferred channels."}, {"t": "Cutoff Date", "d": "The point after which an AI model may not know newer information unless it has web access or another live source."}, {"t": "DALL·E", "d": "OpenAI’s image-generation model family, used to create images from text prompts."}, {"t": "Dashboard", "d": "A visual summary of data, often using charts, KPIs and key insights."}, {"t": "Data Analysis", "d": "Using AI to inspect information, find trends, explain patterns or create summaries."}, {"t": "Data Cleaning", "d": "Fixing or preparing data so it can be analysed properly."}, {"t": "Data Leakage", "d": "When private or sensitive information is accidentally exposed."}, {"t": "Data Privacy", "d": "Protecting personal, sensitive or confidential information when using digital tools, including AI."}, {"t": "Data Quality", "d": "How accurate, complete, consistent and useful data is."}, {"t": "Data Retention", "d": "How long a service keeps user data."}, {"t": "Data Visualisation", "d": "Presenting data visually through charts, graphs, maps or dashboards."}, {"t": "Dataset", "d": "A collection of data used for training, testing or analysing AI systems."}, {"t": "De-Identification", "d": "Removing or changing personal details so information is less likely to identify someone."}, {"t": "Debugging", "d": "Finding and fixing errors in code. AI can help explain and suggest fixes."}, {"t": "Decision Matrix", "d": "A table used to compare options against criteria."}, {"t": "Decision Support", "d": "Using AI to help explore options, risks and trade-offs while humans make the final decision."}, {"t": "Deep Learning", "d": "A type of machine learning that uses large layered systems called neural networks to identify patterns in complex data."}, {"t": "Deepfake", "d": "Synthetic media that convincingly imitates a real person’s likeness or voice."}, {"t": "Deskilling", "d": "The risk that people may lose skills if they rely too much on automation."}, {"t": "Digital Literacy", "d": "The broader ability to use digital tools, platforms and information effectively."}, {"t": "Digital Twin", "d": "A digital representation of a person, process, organisation or system. In business AI, this can mean modelling how a company works."}, {"t": "Document Analysis", "d": "AI reviewing documents to summarise, extract details, compare sections or suggest actions."}, {"t": "Due Date", "d": "The date by which an action should be completed."}, {"t": "Embedding", "d": "A mathematical representation of meaning. It helps AI compare, search and group similar information."}, {"t": "Encryption", "d": "Protecting data by turning it into unreadable code unless someone has the key."}, {"t": "Engagement", "d": "Interactions with content, such as likes, comments, shares, replies, clicks or time spent."}, {"t": "Enterprise AI", "d": "AI tools designed for organisations, often with stronger security, admin controls and data protections."}, {"t": "Escalation", "d": "Moving an issue to a higher level of responsibility when it is sensitive, urgent or risky."}, {"t": "Ethical AI", "d": "AI use guided by fairness, accountability, transparency, safety and respect for people."}, {"t": "Executive Summary", "d": "A brief high-level summary for decision-makers."}, {"t": "Explainability", "d": "The ability to understand why an AI system produced a result."}, {"t": "Extraction", "d": "Pulling specific details from content, such as dates, names, risks, action items or figures."}, {"t": "Fact-Checking", "d": "Verifying whether claims, numbers, names, dates and sources are correct."}, {"t": "Fairness Check", "d": "Reviewing AI output to see whether it could exclude, stereotype or disadvantage anyone."}, {"t": "Feedback Loop", "d": "A process where results or feedback are used to improve future performance."}, {"t": "Few-Shot Prompting", "d": "Giving AI two or more examples so it can mimic the style, structure or format more accurately."}, {"t": "Final Approval", "d": "The point where a responsible person signs off on AI-assisted work."}, {"t": "Fine-Tuning", "d": "Additional training that adjusts a model for a specific task, tone, domain or use case."}, {"t": "Format", "d": "The structure of the answer, such as a table, checklist, captions, campaign plan, email, script or bullet list."}, {"t": "Format Prompting", "d": "Telling AI exactly how to present the output, such as a table, checklist, email, script or action plan."}, {"t": "Foundation Model", "d": "A large general-purpose AI model that can be adapted to many different tasks."}, {"t": "From PDF to Action", "d": "A workflow where AI extracts key points, risks, decisions and next steps from a long document or report."}, {"t": "Frontier Model", "d": "A highly advanced AI model at or near the leading edge of current capabilities."}, {"t": "Function Calling", "d": "A method that allows AI to call specific tools or software functions in a structured way."}, {"t": "Funnel", "d": "The stages someone moves through from awareness to interest to action or purchase."}, {"t": "Garbage In, Garbage Out", "d": "The idea that poor input produces poor output. Bad data or vague prompts lead to weak AI results."}, {"t": "Generative AI / GenAI", "d": "AI that creates new content, such as text, images, video, music, code, summaries or designs, rather than only analysing existing data. Think of it as a creative assistant."}, {"t": "Generative Fill", "d": "AI-powered editing that fills in, replaces or extends part of an image."}, {"t": "Governance Framework", "d": "A structured set of rules, roles and processes for safe AI adoption."}, {"t": "Grounding", "d": "Giving AI reliable source material so its answer is based on facts rather than guessing."}, {"t": "Guardrails", "d": "Rules, limits or safety checks that guide how AI should behave."}, {"t": "Hallucination", "d": "When AI confidently makes up facts, sources, names, dates or details that are not true. Always “trust, but check.”"}, {"t": "Hashtag", "d": "A searchable keyword or phrase used on social platforms, usually marked with #."}, {"t": "Headline", "d": "The main title or opening line of a piece of content."}, {"t": "Human Review", "d": "A person checking AI output before it is used, published, sent or acted on."}, {"t": "Human-in-the-Loop", "d": "A workflow where humans review, approve or guide AI before important actions are taken."}, {"t": "Image Editing", "d": "Using AI to alter an image, such as changing background, style, objects, colours or composition."}, {"t": "Image Generation", "d": "AI creating images from a text prompt or reference image."}, {"t": "Image Prompt", "d": "A descriptive instruction used to tell an image AI exactly what to create. A useful formula is Subject + Setting + Style + Mood + Details + Format."}, {"t": "Image Prompt Formula", "d": "A visual prompt structure: Subject + Setting + Style + Mood + Details + Format."}, {"t": "Image-to-Image", "d": "Creating or editing an le words inside an image, useful for posters, graphics and mockups."}, {"t": "Text-to-Image", "d": "Creating an image from a written description."}, {"t": "Text-to-Speech", "d": "Turning written text into spoken audio."}, {"t": "Text-to-Video", "d": "Creating video from a written prompt."}, {"t": "Token", "d": "A small unit of text processed by an AI model. One token is roughly three-quarters of a word. Models have token limits, which affect how much they can handle in one conversation."}, {"t": "Token Limit", "d": "The maximum amount of text an AI model can process at once, including your prompt, previous messages and uploaded content."}, {"t": "Tone", "d": "The feeling or attitude of writing, such as friendly, formal, calm, confident, playful or apologetic."}, {"t": "Tool Use", "d": "When an AI system uses external tools, such as web search, calculators, calendars, email, code execution or file analysis."}, {"t": "Training Data", "d": "The information used to train an AI model, such as text, images, code or other examples."}, {"t": "Transcription", "d": "Converting speech or audio into written text."}, {"t": "Translation", "d": "Converting text from one language to another."}, {"t": "Transparency", "d": "Being clear about when and how AI is used."}, {"t": "Trend", "d": "A pattern or direction of change over time."}, {"t": "Trigger", "d": "An event that starts an automation, such as receiving an email or submitting a form."}, {"t": "Unstructured Data", "d": "Data without a fixed structure, such as emails, documents, images, videos or notes."}, {"t": "Upscaling", "d": "Using AI to make an image larger, sharper or higher-resolution."}, {"t": "Upskilling", "d": "Learning new skills, often to adapt to new tools or workplace changes."}, {"t": "Use Case", "d": "A specific practical example of how AI can be used."}, {"t": "User Prompt", "d": "The instruction entered by the user."}, {"t": "Value Proposition", "d": "A clear statement explaining why someone should choose you var currentSort = 'az';
var currentLetter = null;
var searchQuery = '';
var searchInput = document.getElementById('search-input');
var clearBtn = document.getElementById('clear-btn');
var grid = document.getElementById('glossary-grid');
var noResults = document.getElementById('no-results');
var visibleCount = document.getElementById('visible-count');
var alphaNav = document.getElementById('alpha-nav');

// Build alphabet nav
var allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ#'.split('');
var usedLetters = {};
DATA.forEach(function(t) {
  var first = t.t.charAt(0).toUpperCase();
  if (/[A-Z]/.test(first)) usedLetters[first] = true;
  else usedLetters['#'] = true;
});

allLetters.forEach(function(l) {
  var btn = document.createElement('button');
  btn.className = 'alpha-btn' + (usedLetters[l] ? '' : ' disabled');
  btn.textContent = l;
  btn.dataset.letter = l;
  btn.onclick = function() { toggleLetter(l); };
  alphaNav.appendChild(btn);
});

function toggleLetter(l) {
  if (currentLetter === l) { currentLetter = null; }
  else { currentLetter = l; }
  updateAlphaButtons();
  render();
}

function updateAlphaButtons() {
  document.querySelectorAll('.alpha-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.letter === currentLetter);
  });
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.sort === s);
  });
  render();
}

function clearSearch() {
  searchInput.value = '';
  searchQuery = '';
  clearBtn.style.display = 'none';
  render();
  searchInput.focus();
}

searchInput.addEventListener('input', function() {
  searchQuery = this.value.trim().toLowerCase();
  clearBtn.style.display = searchQuery ? 'block' : 'none';
  render();
});

function highlight(text, q) {
  if (!q) return escHtml(text);
  var safe = escHtml(text);
  var qEsc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp('(' + qEsc + ')', 'gi'), '<mark>$1</mark>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFirstLetter(t) {
  var c = t.charAt(0).toUpperCase();
  return /[A-Z]/.test(c) ? c : '#';
}

function render() {
  var filtered = DATA.filter(function(t) {
    if (currentLetter) {
      var fl = getFirstLetter(t.t);
      if (fl !== currentLetter) return false;
    }
    if (searchQuery) {
      return t.t.toLowerCase().indexOf(searchQuery) !== -1 || t.d.toLowerCase().indexOf(searchQuery) !== -1;
    }
    return true;
  });

  // Sort
  if (currentSort === 'az') filtered.sort(function(a,b){ return a.t.localeCompare(b.t); });
  else if (currentSort === 'za') filtered.sort(function(a,b){ return b.t.localeCompare(a.t); });
  else if (currentSort === 'short') filtered.sort(function(a,b){ return a.d.length - b.d.length; });
  else if (currentSort === 'long') filtered.sort(function(a,b){ return b.d.length - a.d.length; });
  else if (currentSort === 'random') { for(var i=filtered.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=filtered[i];filtered[i]=filtered[j];filtered[j]=tmp;} }

  visibleCount.textContent = filtered.length + ' shown';

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  // Group by letter for A-Z/Z-A sorts (unless searching)
  var useGroups = !searchQuery && (currentSort === 'az' || currentSort === 'za') && !currentLetter;
  var html = '';

  if (useGroups) {
    var lastLetter = '';
    filtered.forEach(function(t) {
      var fl = getFirstLetter(t.t);
      if (fl !== lastLetter) {
        if (lastLetter) html += '</div>';
        html += '<div class="letter-header" id="letter-' + fl + '">' + fl + '</div>';
        html += '<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3 mt-3 mb-2">';
        lastLetter = fl;
      }
      html += cardHtml(t);
    });
    html += '</div>';
  } else {
    html += '<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">';
    filtered.forEach(function(t) { html += cardHtml(t); });
    html += '</div>';
  }

  grid.innerHTML = html;
}

function cardHtml(t) {
  return '<div class="gl-card rounded-xl p-4">' +
    '<div class="gl-term">' + highlight(t.t, searchQuery) + '</div>' +
    '<div class="gl-def">' + highlight(t.d, searchQuery) + '</div>' +
    '</div>';
}

render();

// Init lucide icons
if (typeof lucide !== 'undefined') lucide.createIcons();
</script>

<script>
/* Theme toggle — persists via localStorage */
(function(){
  var KEY = 'cos_ai_theme';
  var saved = localStorage.getItem(KEY);
  if(saved === 'light') document.body.classList.add('light-mode');
  updateIcon();

  window.toggleTheme = function(){
    document.body.classList.toggle('light-mode');
    var isLight = document.body.classList.contains('light-mode');
    localStorage.setItem(KEY, isLight ? 'light' : 'dark');
    updateIcon();
  };

  function updateIcon(){
    var isLight = document.body.classList.contains('light-mode');
    document.querySelectorAll('.theme-icon-dark').forEach(function(el){ el.style.display = isLight ? 'none' : 'block'; });
    document.querySelectorAll('.theme-icon-light').forEach(function(el){ el.style.display = isLight ? 'block' : 'none'; });
  }

  if(saved === 'light' && !document.body.classList.contains('light-mode')){
    document.body.classList.add('light-mode');
  }
})();
</script>
