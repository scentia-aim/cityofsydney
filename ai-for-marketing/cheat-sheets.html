<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheat Sheets | AIM AI Bootcamp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/city-theme.css" />
  <style>
    body{padding-bottom:4rem!important}

    /* Search bar */
    .cs-search {
      width: 100%;
      max-width: 480px;
      margin: 0 auto 1.5rem;
      position: relative;
    }
    .cs-search input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 200ms ease;
    }
    .cs-search input:focus {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(109,216,255,0.1);
    }
    .cs-search input::placeholder { color: rgba(255,255,255,0.35); }
    .cs-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      pointer-events: none;
    }
    body.light-mode .cs-search input {
      border-color: rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.04);
      color: #1e293b;
    }
    body.light-mode .cs-search input:focus {
      border-color: rgba(46,61,125,0.3);
      background: rgba(0,0,0,0.06);
      box-shadow: 0 0 0 3px rgba(46,61,125,0.08);
    }
    body.light-mode .cs-search input::placeholder { color: rgba(0,0,0,0.35); }
    body.light-mode .cs-search-icon { color: rgba(0,0,0,0.3); }

    /* Topic pills */
    .topic-btn {
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms ease;
      font-family: inherit;
      white-space: nowrap;
    }
    .topic-btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.2);
    }
    .topic-btn.active {
      background: rgba(109,216,255,0.15);
      color: #6dd8ff;
      border-color: rgba(109,216,255,0.3);
    }
    body.light-mode .topic-btn {
      border-color: rgba(0,0,0,0.1);
      background: rgba(0,0,0,0.03);
      color: rgba(0,0,0,0.5);
    }
    body.light-mode .topic-btn:hover {
      background: rgba(0,0,0,0.06);
      color: rgba(0,0,0,0.7);
      border-color: rgba(0,0,0,0.15);
    }
    body.light-mode .topic-btn.active {
      background: rgba(46,61,125,0.1);
      color: #2e3d7d;
      border-color: rgba(46,61,125,0.25);
    }

    /* Card styles */
    .cs-card {
      transition: all 250ms ease;
      flex-shrink: 0;
      cursor: pointer;
    }
    .cs-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }
    .cs-card img { transition: transform 300ms ease; }
    .cs-card:hover img { transform: scale(1.03); }
    .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
    .badge-shared { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
    .badge-business { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
    .badge-marketing { background: rgba(255,77,154,0.1); color: #ff4d9a; }

    /* Carousel container */
    .carousel-wrap {
      position: relative;
      overflow: hidden;
      margin: 0 -8px;
      padding: 8px;
    }
    .carousel-track {
      display: flex;
      gap: 16px;
      transition: transform 450ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .carousel-track .cs-card {
      width: calc((100% - 64px) / 5);
      min-width: calc((100% - 64px) / 5);
    }
    @media (max-width: 1023px) {
      .carousel-track .cs-card {
        width: calc((100% - 32px) / 3);
        min-width: calc((100% - 32px) / 3);
      }
    }
    @media (max-width: 639px) {
      .carousel-track .cs-card {
        width: 100%;
        min-width: 100%;
      }
    }

    /* Carousel arrows */
    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(26,34,73,0.85);
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: all 200ms ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .carousel-arrow:hover {
      background: rgba(26,34,73,0.95);
      color: #fff;
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .carousel-arrow.prev { left: 8px; }
    .carousel-arrow.next { right: 8px; }
    body.light-mode .carousel-arrow {
      background: rgba(255,255,255,0.9);
      border-color: rgba(0,0,0,0.1);
      color: #475569;
    }
    body.light-mode .carousel-arrow:hover {
      background: #fff;
      color: #1e293b;
      border-color: rgba(0,0,0,0.2);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    /* Carousel dots */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
    }
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      transition: all 200ms ease;
      border: none;
      padding: 0;
    }
    .carousel-dot.active {
      background: rgba(109,216,255,0.7);
      width: 24px;
      border-radius: 4px;
    }
    .carousel-dot:hover { background: rgba(255,255,255,0.3); }
    .carousel-dot.active:hover { background: rgba(109,216,255,0.85); }
    body.light-mode .carousel-dot { background: rgba(0,0,0,0.1); }
    body.light-mode .carousel-dot.active { background: rgba(46,61,125,0.5); }
    body.light-mode .carousel-dot:hover { background: rgba(0,0,0,0.2); }
    body.light-mode .carousel-dot.active:hover { background: rgba(46,61,125,0.7); }

    /* Count indicator */
    .cs-count {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
      font-weight: 500;
    }
    body.light-mode .cs-count { color: rgba(0,0,0,0.4); }

    /* Grid mode (for search results) */
    .cs-grid-results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 1023px) {
      .cs-grid-results { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 639px) {
      .cs-grid-results { grid-template-columns: 1fr; }
    }
    .cs-grid-results .cs-card {
      width: 100% !important;
      min-width: 0 !important;
    }

    /* No results */
    .cs-no-results {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.4);
      font-size: 15px;
    }
    body.light-mode .cs-no-results { color: rgba(0,0,0,0.4); }
  </style>

  <style>html.light-pending body{background:#f4f5f9!important}</style>
<script>/* Reset wipe — clears localStorage for this directory scope */
try{if(document.cookie.indexOf('cos_ai_reset=1')!==-1){for(var _ri=localStorage.length-1;_ri>=0;_ri--){var _rk=localStorage.key(_ri);if(_rk&&_rk.indexOf('cos_ai_')===0)localStorage.removeItem(_rk);}document.cookie='cos_ai_reset=;path=/;max-age=0';}}catch(e){}</script>
<script>/* Early theme apply — prevents flash */try{if(localStorage.getItem('cos_ai_theme')==='light')document.documentElement.classList.add('light-pending')}catch(e){}</script>
</head>
<body>

  <nav class="aim-nav fixed top-0 left-0 right-0 z-50 py-5">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
      <a href="https://www.aim.com.au" target="_blank"><img src="../assets/aimlogo_white.png" alt="AIM" class="h-8 sm:h-10"></a>

        <svg class="theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

  </nav>

  <main class="relative z-10 max-w-6xl mx-auto px-6 pt-28 pb-20">
    <!-- Hero -->
    <div class="text-center mb-10">
      <div class="w-16 h-16 rounded-2xl bg-white/10 border border-white/15 flex items-center justify-center mx-auto mb-6 fade-up">
        <i data-lucide="file-down" class="w-8 h-8" style="color:rgba(255,255,255,0.7)"></i>
      </div>
      <h1 class="text-3xl sm:text-4xl font-bold mb-3 fade-up" style="animation-delay:100ms">
        Cheat <span class="gradient-text">Sheets</span>
      </h1>
      <p class="text-lg fade-up" style="color:var(--aim-text);animation-delay:150ms">Printable reference guides for every module. Click any card to download.</p>
      <p class="text-sm mt-2 fade-up" style="color:var(--aim-muted);animation-delay:200ms">44 cheat sheets &bull; PNG format &bull; Print-ready</p>
    </div>

    <!-- Search -->
    <div class="cs-search fade-up" style="animation-delay:220ms">
      <svg class="cs-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="cs-search-input" placeholder="Search cheat sheets by title, module, or course..." />
    </div>

    <!-- Topic Filters -->
    <div class="flex flex-wrap justify-center gap-2 mb-8 fade-up" style="animation-delay:260ms" id="topic-filters">
    </div>

    <!-- Count -->
    <div class="cs-count fade-up" style="animation-delay:280ms" id="cs-count"></div>

    <!-- Carousel View -->
    <div id="carousel-view" class="mt-6 fade-up" style="animation-delay:300ms">
      <div class="carousel-wrap" id="carousel-wrap">
        <button class="carousel-arrow prev" id="carousel-prev" aria-label="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="carousel-track" id="carousel-track"></div>
        <button class="carousel-arrow next" id="carousel-next" aria-label="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="carousel-dots" id="carousel-dots"></div>
    </div>

    <!-- Grid View (search results) -->
    <div id="grid-view" class="mt-6" style="display:none">
      <div class="cs-grid-results" id="cs-grid"></div>
    </div>
  </main>

  <footer class="border-t py-8" style="border-color:var(--aim-panel)">
    <div class="max-w-6xl mx-auto px-6 text-center text-xs" style="color:var(--aim-muted)">AIM AI Bootcamp for Small Business</div>
  </footer>

  <script>
    lucide.createIcons();

    var sheets = [
      // Shared
      { id:1, title:"What Should I Use AI For?", file:"WhatShouldIUseAIFor", course:"shared", module:"Welcome / Getting Started", order:1 },
      { id:2, title:"AI in Plain English", file:"AIinPlainEnglish", course:"shared", module:"AI Basics", order:2 },
      { id:3, title:"Before You Paste: Safety Checklist", file:"BeforeYouPasteSafetyChecklist", course:"shared", module:"Responsible AI", order:3 },
      { id:4, title:"Act — Explain — Please: Prompt Formula", file:"ActExplainPleasePromptFormula", course:"shared", module:"Prompting", order:4 },
      { id:5, title:"One Task, Five Better Prompts", file:"OneTaskFiveBetterPrompts", course:"shared", module:"Better Prompting", order:5 },
      { id:6, title:"Trust, But Check", file:"TrustButCheck", course:"shared", module:"Hallucinations", order:6 },
      { id:7, title:"Would This Be Fair to Everyone?", file:"WouldThisBeFair", course:"shared", module:"Bias", order:7 },
      { id:8, title:"Chat vs Workflow vs Agent", file:"ChatvsWorkflow", course:"shared", module:"Workflows", order:8 },
      { id:9, title:"7-Day AI Habit Builder", file:"7DayAIHabitBuilder", course:"shared", module:"Implementation", order:9 },
      { id:30, title:"Prompt Chains", file:"PromptChains", course:"shared", module:"Workflows", order:10 },
      { id:31, title:"The Second Opinion Technique", file:"TheSecondOpinionTechnique", course:"shared", module:"Quality Checking", order:11 },
      // Business
      { id:10, title:"AI for Time-Poor Business Owners", file:"AIForTimePoorBusinessOwners", course:"business", module:"Business Opportunities", order:1 },
      { id:11, title:"Safe Context Rewriter", file:"SafeContextRewriter", course:"business", module:"Safe AI for Business", order:2 },
      { id:12, title:"The Business Prompt Formula", file:"TheBusinessPromptFormula", course:"business", module:"Prompting for Business", order:3 },
      { id:13, title:"Daily Admin Prompt Pack", file:"DailyAdminPromptPack", course:"business", module:"Admin and Operations", order:4 },
      { id:14, title:"Email Reply Helper", file:"EmailReplyHelper", course:"business", module:"Email", order:5 },
      { id:15, title:"Turn Messy Notes → Clear Actions", file:"TurnMessyNotesClearActions", course:"business", module:"Meetings", order:6 },
      { id:16, title:"Document Summary Prompt Sheet", file:"DocumentSummaryPromptSheet", course:"business", module:"Documents", order:7 },
      { id:17, title:"Use AI as a Thinking Partner", file:"UseAIasaThinkingPartner", course:"business", module:"Decisions", order:8 },
      { id:18, title:"Human Review Checklist", file:"HumanReviewChecklist", course:"business", module:"Workflows", order:9 },
      { id:19, title:"AI Workflow Canvas", file:"AIWorkflowCanvas", course:"business", module:"Implementation", order:10 },
      { id:32, title:"AI Meeting Assistant", file:"AIMeetingAssistant", course:"business", module:"Meetings", order:11 },
      { id:33, title:"Policy Draft Helper", file:"PolicyDraftHelper", course:"business", module:"Policy & Compliance", order:12 },
      { id:34, title:"Data to Dashboard", file:"DatatoDashboard", course:"business", module:"Data & Reporting", order:13 },
      { id:35, title:"AI for Internal Comms", file:"AIforInternalComms", course:"business", module:"Communications", order:14 },
      { id:36, title:"From PDF to Action", file:"FromPDFtoAction", course:"business", module:"Documents", order:15 },
      { id:37, title:"Stakeholder Email Templates", file:"StakeholderEmailTemplates", course:"business", module:"Email", order:16 },
      // Marketing
      { id:20, title:"What Marketing Task Is Slowing You Down?", file:"WhatMarketingTask", course:"marketing", module:"Marketing Opportunities", order:1 },
      { id:21, title:"Who Are We Talking To?", file:"WhoAreWeTalkingTo", course:"marketing", module:"Customer Personas", order:3 },
      { id:22, title:"Sound Like Us", file:"SoundLikeUs", course:"marketing", module:"Brand Voice", order:4 },
      { id:23, title:"The Marketing Prompt Formula", file:"TheMarketingPromptFormula", course:"marketing", module:"Prompting for Marketing", order:5 },
      { id:24, title:"One Idea, Five Posts", file:"OneIdeaFivePosts", course:"marketing", module:"Social Content", order:6 },
      { id:25, title:"Better Customer Messages", file:"BetterCustomerMessages", course:"marketing", module:"Customer Engagement", order:7 },
      { id:26, title:"Review Reply Cheat Sheet", file:"ReviewReplyCheatSheet", course:"marketing", module:"Customer Engagement", order:8 },
      { id:27, title:"30-Day Campaign Builder", file:"30DayCampaignBuilder", course:"marketing", module:"Campaign Planning", order:9 },
      { id:28, title:"Ready to Publish?", file:"ReadyToPublish", course:"marketing", module:"Publishing", order:10 },
      { id:29, title:"Image Prompt Formula", file:"ImagePromptFormula", course:"marketing", module:"Visual Content", order:11 },
      // New Cheat Sheets
      { id:38, title:"Small Business AI Starter Map", file:"SmallBusinessAIStarterMap", course:"business", module:"Getting Started", order:17 },
      { id:39, title:"Customer Complaint Response Sheet", file:"CustomerComplaintResponseSheet", course:"business", module:"Customer Service", order:18 },
      { id:40, title:"Social Media Post Builder", file:"SocialMediaPostBuilder", course:"marketing", module:"Social Content", order:12 },
      { id:41, title:"Marketing Message Clarifier", file:"MarketingMessageClarifier", course:"marketing", module:"Messaging", order:13 },
      { id:42, title:"Spot the Hallucination", file:"SpotTheHallucination", course:"shared", module:"Hallucinations", order:12 },
      { id:43, title:"AI Tone Adjuster", file:"AIToneAdjuster", course:"shared", module:"Tone & Style", order:13 },
      { id:44, title:"Customer FAQ Builder", file:"CustomerFAQBuilder", course:"business", module:"Customer Service", order:19 }
    ];

    var courseLabels = { shared:"Shared", business:"AI for Business", marketing:"AI for Marketing" };

    /* ── Topic categories ── */
    var topics = [
      { label: "All Sheets", id: "all", modules: [], courses: [] },
      { label: "Getting Started", id: "getting-started", modules: ["Welcome / Getting Started", "AI Basics", "Business Opportunities", "Marketing Opportunities"], courses: [] },
      { label: "Safety & Privacy", id: "safety", modules: ["Responsible AI", "Safe AI for Business"], courses: [] },
      { label: "Prompting", id: "prompting", modules: ["Prompting", "Better Prompting", "Prompting for Business", "Prompting for Marketing"], courses: [] },
      { label: "Email & Comms", id: "email-comms", modules: ["Email", "Communications", "Customer Engagement"], courses: [] },
      { label: "Documents", id: "documents", modules: ["Documents", "Policy & Compliance", "Data & Reporting"], courses: [] },
      { label: "Social & Content", id: "social-content", modules: ["Social Content", "Campaign Planning", "Publishing", "Visual Content", "Brand Voice", "Customer Personas"], courses: [] },
      { label: "Workflows", id: "workflows", modules: ["Workflows", "Implementation", "Admin and Operations", "Meetings", "Decisions"], courses: [] },
      { label: "Quality & Safety", id: "quality", modules: ["Hallucinations", "Bias", "Quality Checking"], courses: [] },
      { label: "Business", id: "business-course", modules: [], courses: ["business"] },
      { label: "Marketing", id: "marketing-course", modules: [], courses: ["marketing"] }
    ];

    /* ── State ── */
    var currentTopic = "all";
    var searchQuery = "";
    var carouselIndex = 0;

    /* ── Helpers ── */
    function getVisibleCount() {
      var w = window.innerWidth;
      if (w < 640) return 1;
      if (w < 1024) return 3;
      return 5;
    }

    function filterSheets() {
      var result = sheets;

      /* Apply topic filter */
      if (currentTopic !== "all") {
        var topic = null;
        for (var i = 0; i < topics.length; i++) {
          if (topics[i].id === currentTopic) { topic = topics[i]; break; }
        }
        if (topic) {
          result = result.filter(function(s) {
            var matchModule = topic.modules.length > 0 && topic.modules.indexOf(s.module) !== -1;
            var matchCourse = topic.courses.length > 0 && topic.courses.indexOf(s.course) !== -1;
            return matchModule || matchCourse;
          });
        }
      }

      /* Apply search */
      if (searchQuery.length > 0) {
        var q = searchQuery.toLowerCase();
        result = result.filter(function(s) {
          return s.title.toLowerCase().indexOf(q) !== -1 ||
                 s.module.toLowerCase().indexOf(q) !== -1 ||
                 s.course.toLowerCase().indexOf(q) !== -1 ||
                 (courseLabels[s.course] || "").toLowerCase().indexOf(q) !== -1;
        });
      }

      return result;
    }

    function downloadSheet(url, filename) {
      window.open(url, '_blank');
    }

    function buildCard(s) {
      var badgeClass = 'badge-' + s.course;
      var card = document.createElement('div');
      card.className = 'cs-card glass rounded-xl overflow-hidden';
      var pngUrl = '../assets/cheatsheets/' + s.file + '.png';
      var dlName = s.title.replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '-') + '.png';
      card.addEventListener('click', function() { downloadSheet(pngUrl, dlName); });
      card.innerHTML =
        '<div class="aspect-[3/4] overflow-hidden bg-white/5">' +
          '<img src="../assets/cheatsheets/cheatsheet_thumbs/' + s.file + '.jpg" alt="' + s.title + '" class="w-full h-full object-cover object-top" loading="lazy">' +
        '</div>' +
        '<div class="p-4">' +
          '<div class="flex items-center gap-2 mb-2">' +
            '<span class="badge ' + badgeClass + '">' + courseLabels[s.course] + '</span>' +
            '<span class="text-xs" style="color:var(--aim-muted)">' + s.module + '</span>' +
          '</div>' +
          '<h3 class="text-sm font-bold leading-snug" style="color:#ffffff">' + s.title + '</h3>' +
          '<div class="flex items-center gap-1 mt-2 text-xs font-semibold" style="color:rgba(255,255,255,0.7)">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
            ' Download' +
          '</div>' +
        '</div>';
      return card;
    }

    /* ── Topic buttons ── */
    function buildTopicButtons() {
      var container = document.getElementById('topic-filters');
      container.innerHTML = '';
      for (var i = 0; i < topics.length; i++) {
        var t = topics[i];
        var btn = document.createElement('button');
        btn.className = 'topic-btn' + (t.id === currentTopic ? ' active' : '');
        btn.textContent = t.label;
        btn.setAttribute('data-topic', t.id);
        btn.addEventListener('click', function(e) {
          var topicId = this.getAttribute('data-topic');
          currentTopic = topicId;
          carouselIndex = 0;

          /* Clear search when picking a topic */
          var input = document.getElementById('cs-search-input');
          if (input) { input.value = ''; }
          searchQuery = '';

          /* Update active state */
          var allBtns = document.querySelectorAll('.topic-btn');
          for (var j = 0; j < allBtns.length; j++) {
            allBtns[j].classList.remove('active');
          }
          this.classList.add('active');

          render();
        });
        container.appendChild(btn);
      }
    }

    /* ── Carousel rendering ── */
    function renderCarousel(filtered) {
      var track = document.getElementById('carousel-track');
      var dotsContainer = document.getElementById('carousel-dots');
      var carouselView = document.getElementById('carousel-view');
      var gridView = document.getElementById('grid-view');

      carouselView.style.display = 'block';
      gridView.style.display = 'none';

      track.innerHTML = '';
      dotsContainer.innerHTML = '';

      for (var i = 0; i < filtered.length; i++) {
        var card = buildCard(filtered[i]);
        track.appendChild(card);
      }

      var visible = getVisibleCount();
      var totalPages = Math.max(1, Math.ceil(filtered.length / visible));
      if (carouselIndex >= totalPages) carouselIndex = totalPages - 1;
      if (carouselIndex < 0) carouselIndex = 0;

      /* Build dots */
      for (var d = 0; d < totalPages; d++) {
        var dot = document.createElement('button');
        dot.className = 'carousel-dot' + (d === carouselIndex ? ' active' : '');
        dot.setAttribute('data-page', String(d));
        dot.setAttribute('aria-label', 'Page ' + (d + 1));
        dot.addEventListener('click', function() {
          carouselIndex = parseInt(this.getAttribute('data-page'), 10);
          updateCarouselPosition();
          updateDots();
          updateCount(filtered);
        });
        dotsContainer.appendChild(dot);
      }

      updateCarouselPosition();
      updateCount(filtered);

      /* Show/hide arrows */
      var prevBtn = document.getElementById('carousel-prev');
      var nextBtn = document.getElementById('carousel-next');
      if (filtered.length <= visible) {
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
        dotsContainer.style.display = 'none';
      } else {
        prevBtn.style.display = 'flex';
        nextBtn.style.display = 'flex';
        dotsContainer.style.display = 'flex';
      }
    }

    function updateCarouselPosition() {
      var track = document.getElementById('carousel-track');
      var visible = getVisibleCount();
      var cardWidth = 100 / visible;
      var gapPercent = 16 / track.parentElement.offsetWidth * 100;
      var offset = carouselIndex * (visible * cardWidth + visible * gapPercent);

      /* Use pixel-based calculation for accuracy */
      var wrapWidth = track.parentElement.offsetWidth;
      var gap = 16;
      var cardPx = (wrapWidth - gap * (visible - 1)) / visible;
      var offsetPx = carouselIndex * (visible * cardPx + visible * gap);

      track.style.transform = 'translateX(-' + offsetPx + 'px)';
    }

    function updateDots() {
      var dots = document.querySelectorAll('.carousel-dot');
      for (var i = 0; i < dots.length; i++) {
        if (i === carouselIndex) {
          dots[i].classList.add('active');
        } else {
          dots[i].classList.remove('active');
        }
      }
    }

    function updateCount(filtered) {
      var countEl = document.getElementById('cs-count');
      var visible = getVisibleCount();
      var total = filtered.length;

      if (searchQuery.length > 0) {
        countEl.textContent = 'Showing ' + total + ' result' + (total !== 1 ? 's' : '');
      } else {
        var start = carouselIndex * visible + 1;
        var end = Math.min(start + visible - 1, total);
        if (total === 0) {
          countEl.textContent = 'No sheets found';
        } else if (total <= visible) {
          countEl.textContent = total + ' of ' + sheets.length + ' sheets';
        } else {
          countEl.textContent = start + '–' + end + ' of ' + total + ' sheets';
        }
      }
    }

    /* ── Grid rendering (search mode) ── */
    function renderGrid(filtered) {
      var carouselView = document.getElementById('carousel-view');
      var gridView = document.getElementById('grid-view');
      var grid = document.getElementById('cs-grid');
      var countEl = document.getElementById('cs-count');

      carouselView.style.display = 'none';
      gridView.style.display = 'block';
      grid.innerHTML = '';

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="cs-no-results" style="grid-column:1/-1">No cheat sheets match your search. Try a different term.</div>';
      } else {
        for (var i = 0; i < filtered.length; i++) {
          var card = buildCard(filtered[i]);
          card.style.animationDelay = (i * 30) + 'ms';
          card.classList.add('fade-up');
          grid.appendChild(card);
        }
      }

      countEl.textContent = 'Showing ' + filtered.length + ' result' + (filtered.length !== 1 ? 's' : '');
    }

    /* ── Main render ── */
    function render() {
      var filtered = filterSheets();
      var isSearching = searchQuery.length > 0;

      if (isSearching) {
        renderGrid(filtered);
      } else {
        renderCarousel(filtered);
      }
    }

    /* ── Carousel navigation ── */
    document.getElementById('carousel-prev').addEventListener('click', function() {
      var filtered = filterSheets();
      var visible = getVisibleCount();
      var totalPages = Math.max(1, Math.ceil(filtered.length / visible));
      carouselIndex = carouselIndex - 1;
      if (carouselIndex < 0) carouselIndex = totalPages - 1;
      updateCarouselPosition();
      updateDots();
      updateCount(filtered);
    });

    document.getElementById('carousel-next').addEventListener('click', function() {
      var filtered = filterSheets();
      var visible = getVisibleCount();
      var totalPages = Math.max(1, Math.ceil(filtered.length / visible));
      carouselIndex = carouselIndex + 1;
      if (carouselIndex >= totalPages) carouselIndex = 0;
      updateCarouselPosition();
      updateDots();
      updateCount(filtered);
    });

    /* ── Search ── */
    var searchTimer = null;
    document.getElementById('cs-search-input').addEventListener('input', function() {
      var self = this;
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function() {
        searchQuery = self.value.trim();
        carouselIndex = 0;
        render();
      }, 200);
    });

    /* ── Keyboard navigation ── */
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (searchQuery.length > 0) return;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        document.getElementById('carousel-prev').click();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        document.getElementById('carousel-next').click();
      }
    });

    /* ── Resize handler ── */
    var resizeTimer = null;
    window.addEventListener('resize', function() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        if (searchQuery.length === 0) {
          var filtered = filterSheets();
          var visible = getVisibleCount();
          var totalPages = Math.max(1, Math.ceil(filtered.length / visible));
          if (carouselIndex >= totalPages) carouselIndex = totalPages - 1;
          render();
        }
      }, 150);
    });

    /* ── Init ── */
    buildTopicButtons();
    render();
  </script>
  <script>
  /* Theme toggle — persists via localStorage */
  (function(){
    var KEY = 'cos_ai_theme';
    var saved = localStorage.getItem(KEY);
    if(saved === 'light') document.body.classList.add('light-mode');
    updateIcon();

    window.toggleTheme = function(){
      document.body.classList.toggle('light-mode');
      var isLight = document.body.classList.contains('light-mode');
      localStorage.setItem(KEY, isLight ? 'light' : 'dark');
      updateIcon();
    };

    function updateIcon(){
      var isLight = document.body.classList.contains('light-mode');
      document.querySelectorAll('.theme-icon-dark').forEach(function(el){ el.style.display = isLight ? 'none' : 'block'; });
      document.querySelectorAll('.theme-icon-light').forEach(function(el){ el.style.display = isLight ? 'block' : 'none'; });
    }

    /* Apply theme immediately on page load (before DOMContentLoaded for fast switch) */
    if(saved === 'light' && !document.body.classList.contains('light-mode')){
      document.body.classList.add('light-mode');
    }
  })();
  </script>

        meeting:'a production planning meeting for an upcoming season',
        competitor:'other galleries, venues, and cultural organisations competing for audience attention',
        painPoint:'unpredictable attendance, funding cycles, and converting casual visitors into regulars',
        goal:'build a loyal subscriber base and increase sponsorship and grant revenue',
        socialPost:'a sneak peek of an upcoming exhibition or performance with the artist\'s story',
        newsletter:'a monthly what\'s-on email with upcoming shows, artist features, and behind-the-scenes exclusives'
      }
    }
  ];

  /* ── Expose globally ── */
  window.COS_INDUSTRIES = INDUSTRIES;
  window.COS_INDUSTRY_KEY = KEY;

  /* ── Get / set current industry ── */
  function getCurrent() {
    var id = localStorage.getItem(KEY) || getCookie(KEY);
    if (!id) return null;
    for (var i = 0; i < INDUSTRIES.length; i++) {
      if (INDUSTRIES[i].id === id) return INDUSTRIES[i];
    }
    return null;
  }
  function setCurrent(id) {
    localStorage.setItem(KEY, id);
    setCookie(KEY, id);
    window.dispatchEvent(new CustomEvent('industryChanged', { detail: id }));
  }
  window.getCosIndustry = getCurrent;
  window.setCosIndustry = setCurrent;

  /* ── Nav dropdown ── */
  function buildNavDropdown() {
    var nav = document.querySelector('.aim-nav');
    if (!nav) return;
    var themeBtn = nav.querySelector('.theme-toggle');
    if (!themeBtn) return;

    var wrap = document.createElement('div');
    wrap.className = 'industry-nav-wrap';
    wrap.style.cssText = 'position:relative;display:flex;align-items:center;flex-shrink:0;';

    var btn = document.createElement('button');
    btn.className = 'industry-nav-btn';
    btn.style.cssText = 'height:36px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 200ms ease;font-family:inherit;font-size:12px;font-weight:600;white-space:nowrap;';

    function updateBtn() {
      var ind = getCurrent();
      if (ind) {
        btn.innerHTML = '<span style="font-size:14px;">' + ind.emoji + '</span><span class="ind-label">' + ind.name + '</span><span style="font-size:10px;opacity:0.6;">▼</span>';
      } else {
        btn.innerHTML = '<span style="font-size:14px;">🏢</span><span class="ind-label">Select industry</span><span style="font-size:10px;opacity:0.6;">▼</span>';
      }
    }
    updateBtn();

    btn.onmouseover = function(){ btn.style.background='rgba(255,255,255,0.12)'; btn.style.color='#fff'; };
    btn.onmouseout = function(){ btn.style.background='rgba(255,255,255,0.06)'; btn.style.color='rgba(255,255,255,0.7)'; };

    /* Dropdown panel */
    var dd = document.createElement('div');
    dd.className = 'industry-dropdown';
    dd.style.cssText = 'position:absolute;top:calc(100% + 6px);right:0;background:rgba(26,34,73,0.97);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:6px;min-width:240px;max-height:420px;overflow-y:auto;display:none;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 12px 40px rgba(0,0,0,0.5);z-index:9999;';

    var ddTitle = document.createElement('div');
    ddTitle.textContent = 'Choose your industry';
    ddTitle.style.cssText = 'padding:8px 10px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.4);';
    dd.appendChild(ddTitle);

    INDUSTRIES.forEach(function(ind) {
      var item = document.createElement('button');
      item.style.cssText = 'display:flex;align-items:center;gap:10px;width:100%;padding:10px;border:none;background:transparent;color:rgba(255,255,255,0.8);font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:background 0.15s ease;text-align:left;font-family:inherit;';
      item.innerHTML = '<span style="font-size:18px;width:28px;text-align:center;flex-shrink:0;">' + ind.emoji + '</span><span>' + ind.name + '</span>';
      item.onmouseover = function(){ item.style.background='rgba(255,255,255,0.08)'; };
      item.onmouseout = function(){
        var cur = getCurrent();
        item.style.background = (cur && cur.id === ind.id) ? 'rgba(255,255,255,0.1)' : 'transparent';
      };
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        setCurrent(ind.id);
        updateBtn();
        dd.style.display = 'none';
        highlightCurrent();
        tailorPrompts();
      });
      dd.appendChild(item);
    });

    function highlightCurrent() {
      var cur = getCurrent();
      var items = dd.querySelectorAll('button');
      items.forEach(function(it, idx) {
        it.style.background = (cur && INDUSTRIES[idx] && INDUSTRIES[idx].id === cur.id) ? 'rgba(255,255,255,0.1)' : 'transparent';
      });
    }

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var isOpen = dd.style.display === 'block';
      dd.style.display = isOpen ? 'none' : 'block';
      if (!isOpen) highlightCurrent();
    });
    document.addEventListener('click', function(){ dd.style.display = 'none'; });

    wrap.appendChild(btn);
    wrap.appendChild(dd);
    themeBtn.parentNode.insertBefore(wrap, themeBtn);

    /* Light mode styles */
    var style = document.createElement('style');
    style.textContent = 'body.light-mode .industry-nav-btn{border-color:rgba(0,0,0,0.1)!important;background:rgba(0,0,0,0.04)!important;color:#475569!important;}body.light-mode .industry-nav-btn:hover{background:rgba(0,0,0,0.08)!important;color:#1e293b!important;}body.light-mode .industry-dropdown{background:rgba(255,255,255,0.97)!important;border-color:rgba(0,0,0,0.1)!important;box-shadow:0 12px 40px rgba(0,0,0,0.15)!important;}body.light-mode .industry-dropdown button{color:#334155!important;}body.light-mode .industry-dropdown button:hover{background:rgba(0,0,0,0.05)!important;}body.light-mode .industry-dropdown div{color:#94a3b8!important;}body.light-mode .industry-banner{background:rgba(0,0,0,0.03)!important;border-color:rgba(0,0,0,0.08)!important;color:#475569!important;}body.light-mode .industry-banner strong{color:#1e293b!important;}@media(max-width:640px){.ind-label{display:none!important;}.industry-nav-btn{padding:0 8px!important;}}';
    document.head.appendChild(style);

    window.addEventListener('industryChanged', function(){ updateBtn(); });
  }

  /* ── Prompt tailoring ── */
  function tailorPrompts() {
    var ind = getCurrent();
    if (!ind) return;
    var ph = ind.placeholders;

    /* --- Add/update industry banner on pages with prompt-boxes --- */
    var boxes = document.querySelectorAll('.prompt-box');
    if (boxes.length === 0) return;

    var banner = document.getElementById('industry-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'industry-banner';
      banner.className = 'industry-banner';
      banner.style.cssText = 'display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);margin-bottom:20px;font-size:13px;color:rgba(255,255,255,0.7);';
      /* Insert before the first prompt-box's parent section */
      var firstBox = boxes[0];
      var target = firstBox.closest('section') || firstBox.closest('div') || firstBox.parentNode;
      if (target && target.parentNode) {
        target.parentNode.insertBefore(banner, target);
      }
    }
    banner.innerHTML = '<span style="font-size:20px;">' + ind.emoji + '</span><span>Prompts tailored for <strong style="color:#fff;">' + ind.name + '</strong> — examples and context will reflect your industry.</span>';

    /* --- Replace placeholder text in prompt boxes --- */
    boxes.forEach(function(box) {
      /* Detach live button bar before modifying HTML */
      var _liveBar = box.querySelector('.prompt-btn-bar');
      if (_liveBar) _liveBar.parentNode.removeChild(_liveBar);

      /* Store original HTML on first run (without button bar) */
      if (!box.dataset.originalHtml) {
        box.dataset.originalHtml = box.innerHTML;
      }
      /* Always restore original before applying new industry */
      var html = box.dataset.originalHtml;

      /* Replace bracketed placeholders */
      var replacements = [
        [/\[YOUR BUSINESS\]/gi, '[e.g. ' + ph.business + ']'],
        [/\[YOUR BUSINESS TYPE\]/gi, '[e.g. ' + ph.business + ']'],
        [/\[BUSINESS TYPE\]/gi, '[e.g. ' + ph.business + ']'],
        [/\[DESCRIBE YOUR BUSINESS\]/gi, '[e.g. ' + ph.context + ']'],
        [/\[YOUR PRODUCT\]/gi, '[e.g. ' + ph.product + ']'],
        [/\[YOUR SERVICE\]/gi, '[e.g. ' + ph.service + ']'],
        [/\[DESCRIBE YOUR CUSTOMERS\]/gi, '[e.g. ' + ph.customers + ']'],
        [/\[YOUR CUSTOMERS\]/gi, '[e.g. ' + ph.customers + ']'],
        [/\[YOUR AUDIENCE\]/gi, '[e.g. ' + ph.customers + ']'],
        [/\[DESCRIBE YOUR AUDIENCE\]/gi, '[e.g. ' + ph.customers + ']'],
        [/\[YOUR BRAND VOICE\]/gi, '[e.g. ' + ind.tone + ']'],
        [/\[DESCRIBE HOW YOU CURRENTLY COMMUNICATE\]/gi, '[e.g. ' + ind.tone + ']'],
        [/\[THEME OR PROMOTION\]/gi, '[e.g. ' + ph.socialPost + ']'],
        [/\[YOUR IDEA\]/gi, '[e.g. ' + ph.socialPost + ']'],
        [/\[DESCRIBE YOUR OFFER\]/gi, '[e.g. ' + ph.product + ']'],
        [/\[YOUR 3 CHOSEN WORDS\]/gi, '[e.g. ' + ind.tone + ']']
      ];

      replacements.forEach(function(r) {
        html = html.replace(r[0], r[1]);
      });

      /* Replace generic "small business" phrasing */
      html = html.replace(/a small Australian business/gi, 'a small Australian ' + ph.business.split('/')[0].trim());
      html = html.replace(/a small business/gi, 'a small ' + ph.business.split('/')[0].trim());

      box.innerHTML = html;

      /* Re-append the live button bar (with intact event listeners) */
      if (_liveBar) box.appendChild(_liveBar);
    });

    /* --- Patch the copy function to prepend industry context --- */
    if (!window._industryPatchApplied) {
      window._industryPatchApplied = true;
      var origWrite = navigator.clipboard.writeText.bind(navigator.clipboard);
      navigator.clipboard.writeText = function(text) {
        var curInd = getCurrent();
        /* Only prepend to prompt-like text (skip short strings like URLs) */
        if (curInd && text.length > 50) {
          var prefix = 'Context: ' + curInd.context + '\n\n';
          /* Don't double-prepend */
          if (text.indexOf('Context: I run') !== 0) {
            text = prefix + text;
          }
        }
        return origWrite(text);
      };
    }
  }

  /* ── Form field tailoring ── */
  function tailorFormFields() {
    var ind = getCurrent();
    if (!ind) return;
    var ph = ind.placeholders;

    /* Update placeholder text on input/textarea fields */
    var fieldMap = {
      'business': ph.business,
      'biz': ph.business,
      'company': ph.business,
      'customer': ph.customers,
      'audience': ph.customers,
      'product': ph.product,
      'service': ph.service,
      'tone': ind.tone,
      'voice': ind.tone,
      'task': ph.task,
      'goal': ph.goal
    };

    document.querySelectorAll('input[type="text"], textarea').forEach(function(el) {
      var label = (el.placeholder || '').toLowerCase();
      var id = (el.id || '').toLowerCase();
      var combined = label + ' ' + id;

      Object.keys(fieldMap).forEach(function(key) {
        if (combined.indexOf(key) !== -1 && !el.value) {
          el.placeholder = 'e.g. ' + fieldMap[key];
        }
      });
    });
  }

  /* ── Init ── */
  function init() {
    buildNavDropdown();
    tailorPrompts();
    tailorFormFields();
    window.addEventListener('industryChanged', function() {
      tailorPrompts();
      tailorFormFields();
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>

<!-- AI Glossary Tooltip System -->
<script>
/**
 * AI Glossary — auto-highlights AI terms and shows plain-English tooltips
 * Scans text nodes only (won't break links, inputs, or scripts).
 * First match per term per page to keep it clean.
 */
(function(){
  'use strict';

  var TERMS = {
    'hallucination': 'When AI confidently generates information that is incorrect or made up. Always fact-check AI outputs.',
    'hallucinations': 'When AI confidently generates information that is incorrect or made up. Always fact-check AI outputs.',
    'hallucinate': 'When AI confidently generates information that is incorrect or made up. Always fact-check AI outputs.',
    'prompt': 'The instruction or question you type into an AI tool. A better prompt = a better answer.',
    'prompts': 'Instructions or questions you type into an AI tool. Better prompts = better answers.',
    'prompting': 'The skill of writing clear, effective instructions for AI tools to get the best results.',
    'token': 'The small chunks (roughly words or word-pieces) that AI reads and generates. More tokens = longer conversations, higher cost.',
    'tokens': 'The small chunks (roughly words or word-pieces) that AI reads and generates. More tokens = longer conversations, higher cost.',
    'context window': 'The amount of text an AI can "remember" in one conversation. Think of it as the AI\'s short-term memory.',
    'large language model': 'The technology behind tools like ChatGPT and Claude. It predicts the next word based on patterns in its training data.',
    'LLM': 'Large Language Model — the technology behind ChatGPT, Claude, and similar tools. Predicts text based on patterns learned from training data.',
    'generative AI': 'AI that creates new content (text, images, code) rather than just analysing existing data.',
    'ChatGPT': 'An AI chatbot made by OpenAI. One of the most popular tools for generating text, answering questions, and brainstorming.',
    'Claude': 'An AI assistant made by Anthropic. Known for longer, more nuanced responses and strong safety features.',
    'Gemini': 'Google\'s AI assistant, built into Google Workspace. Good for tasks connected to Google Search and Docs.',
    'Copilot': 'Microsoft\'s AI assistant, built into Word, Excel, Outlook, and Edge. Useful if you already use Microsoft 365.',
    'brand voice': 'The consistent personality and tone your business uses across all communications — friendly, professional, playful, etc.',
    'persona': 'A fictional profile representing your ideal customer — their needs, habits, and what motivates them to buy.',
    'workflow': 'A repeatable sequence of steps to complete a task. AI can automate or speed up parts of a workflow.',
    'repurpose': 'Taking one piece of content and adapting it for different platforms — e.g. turning a blog post into social media posts.',
    'repurposing': 'Taking one piece of content and adapting it for different platforms — e.g. turning a blog post into social media posts.',
    'training data': 'The massive collection of text and information an AI was trained on. The AI doesn\'t "know" things — it recognises patterns from this data.',
    'iteration': 'Refining your AI output by sending follow-up prompts. Rarely is the first result perfect — iteration is normal and expected.',
    'iterating': 'Refining your AI output by sending follow-up prompts. Rarely is the first result perfect — iteration is normal and expected.',
    'temperature': 'A setting that controls how creative or predictable AI responses are. Low = focused and consistent. High = varied and creative.',
    'AI model': 'The trained software that powers an AI tool. Different models (GPT-4, Claude, Gemini) have different strengths.',
    'bias': 'When AI reflects unfair assumptions from its training data — e.g. gender or cultural stereotypes. Important to watch for and correct.',
    'guardrails': 'Safety limits built into AI tools that prevent harmful, inappropriate, or dangerous outputs.',
    'zero-shot': 'Asking AI to do something with no examples — just a plain instruction. Works for simple tasks.',
    'few-shot': 'Giving AI a few examples of what you want before asking it to generate. Improves quality for specific formats or styles.',
    'chain of thought': 'Asking AI to explain its reasoning step by step. Produces more accurate answers for complex problems.',
    'API': 'Application Programming Interface — a way for software to talk to AI tools directly, without using the chat interface.',
    'output': 'The text, table, list, or content that AI generates in response to your prompt.',
    'context': 'The background information you give AI to help it understand your situation and give a relevant answer.'
  };

  /* ── CSS for tooltips ── */
  var style = document.createElement('style');
  style.textContent = [
    '.gl-term {',
    '  border-bottom: 1px dashed rgba(109,216,255,0.4);',
    '  cursor: help;',
    '  position: relative;',
    '  transition: border-color 0.2s ease;',
    '}',
    '.gl-term:hover { border-bottom-color: #6dd8ff; }',
    'body.light-mode .gl-term { border-bottom-color: rgba(46,61,125,0.3); }',
    'body.light-mode .gl-term:hover { border-bottom-color: #2e3d7d; }',
    '',
    '.gl-tip {',
    '  display: none;',
    '  position: absolute;',
    '  bottom: calc(100% + 8px);',
    '  left: 50%;',
    '  transform: translateX(-50%);',
    '  width: max-content;',
    '  max-width: 280px;',
    '  padding: 10px 14px;',
    '  border-radius: 10px;',
    '  font-family: "Lato", Arial, sans-serif;',
    '  font-size: 12px;',
    '  line-height: 1.5;',
    '  font-weight: 400;',
    '  white-space: normal;',
    '  z-index: 1000;',
    '  pointer-events: none;',
    '  background: rgba(20,25,50,0.95);',
    '  border: 1px solid rgba(109,216,255,0.2);',
    '  color: rgba(255,255,255,0.9);',
    '  box-shadow: 0 8px 32px rgba(0,0,0,0.3);',
    '  backdrop-filter: blur(12px);',
    '  -webkit-backdrop-filter: blur(12px);',
    '}',
    'body.light-mode .gl-tip {',
    '  background: rgba(255,255,255,0.97);',
    '  border-color: rgba(0,0,0,0.08);',
    '  color: #334155;',
    '  box-shadow: 0 8px 32px rgba(0,0,0,0.12);',
    '}',
    '.gl-tip::after {',
    '  content: "";',
    '  position: absolute;',
    '  top: 100%;',
    '  left: 50%;',
    '  transform: translateX(-50%);',
    '  border: 6px solid transparent;',
    '  border-top-color: rgba(20,25,50,0.95);',
    '}',
    'body.light-mode .gl-tip::after { border-top-color: rgba(255,255,255,0.97); }',
    '.gl-tip-label {',
    '  font-weight: 700;',
    '  font-size: 11px;',
    '  text-transform: uppercase;',
    '  letter-spacing: 0.05em;',
    '  color: #6dd8ff;',
    '  margin-bottom: 4px;',
    '}',
    'body.light-mode .gl-tip-label { color: #2e3d7d; }',
    '.gl-term:hover .gl-tip { display: block; animation: glFadeIn 0.15s ease; }',
    '@keyframes glFadeIn { from { opacity:0; transform:translateX(-50%) translateY(4px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }',
    '',
    '/* Flip tooltip below if near top of viewport */',
    '.gl-term.gl-flip .gl-tip {',
    '  bottom: auto;',
    '  top: calc(100% + 8px);',
    '}',
    '.gl-term.gl-flip .gl-tip::after {',
    '  top: auto;',
    '  bottom: 100%;',
    '  border-top-color: transparent;',
    '  border-bottom-color: rgba(20,25,50,0.95);',
    '}',
    'body.light-mode .gl-term.gl-flip .gl-tip::after {',
    '  border-top-color: transparent;',
    '  border-bottom-color: rgba(255,255,255,0.97);',
    '}',
    '@media print { .gl-term { border-bottom: none !important; } .gl-tip { display: none !important; } }'
  ].join('\n');
  document.head.appendChild(style);

  /* ── Build case-insensitive lookup ── */
  var termLower = {};
  var termDisplay = {};
  Object.keys(TERMS).forEach(function(t){
    termLower[t.toLowerCase()] = TERMS[t];
    termDisplay[t.toLowerCase()] = t;
  });

  /* Sort terms by length (longest first) so "context window" matches before "context" */
  var sortedTerms = Object.keys(termLower).sort(function(a,b){ return b.length - a.length; });

  /* Build one big regex */
  var escaped = sortedTerms.map(function(t){ return t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); });
  var RE = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');

  /* Track which terms we've already highlighted (first match only) */
  var seen = {};

  /* ── Walk text nodes ── */
  function walk(root){
    var skip = { SCRIPT:1, STYLE:1, TEXTAREA:1, INPUT:1, SELECT:1, BUTTON:1, A:1, CODE:1, PRE:1 };

    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode: function(node){
        var p = node.parentElement;
        if(!p) return NodeFilter.FILTER_REJECT;
        /* Skip if parent is already a glossary term, or is in skip list */
        if(p.classList && p.classList.contains('gl-term')) return NodeFilter.FILTER_REJECT;
        if(p.classList && p.classList.contains('gl-tip')) return NodeFilter.FILTER_REJECT;
        if(p.closest && p.closest('.gl-tip')) return NodeFilter.FILTER_REJECT;
        if(skip[p.tagName]) return NodeFilter.FILTER_REJECT;
        /* Skip prompt-box content — don't annotate inside prompts */
        if(p.closest && p.closest('.prompt-box')) return NodeFilter.FILTER_REJECT;
        if(p.closest && p.closest('.gradient-text')) return NodeFilter.FILTER_REJECT;
        /* Skip nav */
        if(p.closest && p.closest('nav')) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    var nodes = [];
    while(walker.nextNode()) nodes.push(walker.currentNode);

    nodes.forEach(function(textNode){
      var text = textNode.nodeValue;
      if(!RE.test(text)){ return; }
      RE.lastIndex = 0;

      var frag = document.createDocumentFragment();
      var lastIdx = 0;
      var match;

      RE.lastIndex = 0;
      while((match = RE.exec(text)) !== null){
        var term = match[1];
        var key = term.toLowerCase();

        /* Only highlight first occurrence per term */
        if(seen[key]) continue;
        seen[key] = true;

        /* Text before match */
        if(match.index > lastIdx){
          frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
        }

        /* Create the glossary span */
        var span = document.createElement('span');
        span.className = 'gl-term';
        span.textContent = term;

        var tip = document.createElement('span');
        tip.className = 'gl-tip';
        tip.innerHTML = '<div class="gl-tip-label">' + term + '</div>' + termLower[key];
        span.appendChild(tip);

        frag.appendChild(span);
        lastIdx = match.index + term.length;
      }

      if(lastIdx === 0) return; /* no new highlights in this node */

      /* Remaining text */
      if(lastIdx < text.length){
        frag.appendChild(document.createTextNode(text.slice(lastIdx)));
      }

      textNode.parentNode.replaceChild(frag, textNode);
    });
  }

  /* ── Flip detection (tooltip near top of page) ── */
  function addFlipDetection(){
    document.querySelectorAll('.gl-term').forEach(function(el){
      el.addEventListener('mouseenter', function(){
        var rect = el.getBoundingClientRect();
        if(rect.top < 120){
          el.classList.add('gl-flip');
        } else {
          el.classList.remove('gl-flip');
        }
      });
    });
  }

  function init(){
    walk(document.body);
    addFlipDetection();
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>

<script>
/**
 * Reset Button — clears all bootcamp data and returns to lock screen.
 * Two-step confirmation to prevent accidental resets.
 */
(function(){
  'use strict';

  /* Build reset button */
  var btn = document.createElement('button');
  btn.id = 'cos-reset-btn';
  btn.innerHTML = '↺ Reset';
  btn.title = 'Reset all progress and return to start';
  btn.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:9000;padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.25);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.25s ease;letter-spacing:0.02em;';
  btn.onmouseover = function(){ btn.style.color='rgba(255,255,255,0.55)'; btn.style.borderColor='rgba(255,255,255,0.15)'; btn.style.background='rgba(255,255,255,0.06)'; };
  btn.onmouseout = function(){ btn.style.color='rgba(255,255,255,0.25)'; btn.style.borderColor='rgba(255,255,255,0.08)'; btn.style.background='rgba(255,255,255,0.03)'; };

  /* Light mode styles */
  var style = document.createElement('style');
  style.textContent = 'body.light-mode #cos-reset-btn{border-color:rgba(0,0,0,0.06)!important;background:rgba(0,0,0,0.02)!important;color:rgba(0,0,0,0.2)!important;}body.light-mode #cos-reset-btn:hover{border-color:rgba(0,0,0,0.12)!important;background:rgba(0,0,0,0.04)!important;color:rgba(0,0,0,0.4)!important;}body.light-mode #cos-reset-confirm{background:rgba(255,255,255,0.97)!important;border-color:rgba(0,0,0,0.1)!important;box-shadow:0 8px 32px rgba(0,0,0,0.12)!important;}body.light-mode #cos-reset-confirm p{color:#334155!important;}body.light-mode #cos-reset-confirm .reset-msg{color:#64748b!important;}body.light-mode .reset-cancel{border-color:rgba(0,0,0,0.1)!important;background:rgba(0,0,0,0.04)!important;color:#475569!important;}body.light-mode .reset-cancel:hover{background:rgba(0,0,0,0.08)!important;}@media print{#cos-reset-btn,#cos-reset-confirm{display:none!important;}}';
  document.head.appendChild(style);

  /* Confirmation dialog */
  var dialog = document.createElement('div');
  dialog.id = 'cos-reset-confirm';
  dialog.style.cssText = 'display:none;position:fixed;bottom:52px;right:16px;z-index:9001;background:rgba(26,34,73,0.97);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:20px;width:280px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.4);';
  dialog.innerHTML =
    '<p style="color:#fff;font-size:14px;font-weight:700;margin:0 0 6px 0;">Reset everything?</p>' +
    '<p class="reset-msg" style="color:rgba(255,255,255,0.5);font-size:12px;line-height:1.5;margin:0 0 16px 0;">This will clear all your saved work, quiz answers, progress, and industry selection. You\'ll return to the welcome screen.</p>' +
    '<div style="display:flex;gap:8px;">' +
      '<button class="reset-cancel" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s ease;">Cancel</button>' +
      '<button class="reset-confirm-yes" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.12);color:#f87171;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s ease;">Yes, reset all</button>' +
    '</div>';

  var cancelBtn = dialog.querySelector('.reset-cancel');
  var confirmBtn = dialog.querySelector('.reset-confirm-yes');

  cancelBtn.onmouseover = function(){ cancelBtn.style.background='rgba(255,255,255,0.1)'; };
  cancelBtn.onmouseout = function(){ cancelBtn.style.background='rgba(255,255,255,0.06)'; };
  confirmBtn.onmouseover = function(){ confirmBtn.style.background='rgba(239,68,68,0.25)'; };
  confirmBtn.onmouseout = function(){ confirmBtn.style.background='rgba(239,68,68,0.12)'; };

  cancelBtn.addEventListener('click', function(e){
    e.stopPropagation();
    dialog.style.display = 'none';
  });

  confirmBtn.addEventListener('click', function(e){
    e.stopPropagation();
    /* Clear ALL cos_ai_ localStorage keys */
    var keysToRemove = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('cos_ai_') === 0) {
        keysToRemove.push(k);
      }
    }
    keysToRemove.forEach(function(k){ localStorage.removeItem(k); });

    /* Clear sessionStorage */
    sessionStorage.removeItem('cos_ai_unlocked');

    /* Clear industry cookie */
    try { document.cookie = 'cos_ai_industry=;path=/;max-age=0'; document.cookie = 'cos_ai_reset=1;path=/;max-age=120'; } catch(e){}

    /* Navigate to root */
    var path = window.location.pathname;
    var base = path.substring(0, path.indexOf('city-of-sydney-ai-bootcamp'));
    if (base) {
      window.location.href = base + 'city-of-sydney-ai-bootcamp/index.html';
    } else {
      window.location.href = 'index.html';
    }
  });

  btn.addEventListener('click', function(e){
    e.stopPropagation();
    dialog.style.display = dialog.style.display === 'none' ? 'block' : 'none';
  });

  document.addEventListener('click', function(){
    dialog.style.display = 'none';
  });

  dialog.addEventListener('click', function(e){ e.stopPropagation(); });

  /* Don't show on welcome overlay */
  function addToPage(){
    if (document.getElementById('welcome-overlay') && document.body.classList.contains('locked')) {
      /* Wait until unlocked */
      var obs = new MutationObserver(function(){
        if (!document.body.classList.contains('locked')) {
          document.body.appendChild(btn);
          document.body.appendChild(dialog);
          obs.disconnect();
        }
      });
      obs.observe(document.body, { attributes:true, attributeFilter:['class'] });
    } else {
      document.body.appendChild(btn);
      document.body.appendChild(dialog);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', addToPage);
  } else {
    addToPage();
  }
})();

</script>
